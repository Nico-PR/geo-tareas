<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0D0D0D">
<title>1994 SRL — Geo Tareas</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0D0D0D;--surface:#161616;--surface2:#1E1E1E;--border:#2A2A2A;--text:#F0F0EE;--muted:#888;--hint:#444;--amber:#E8A020;--amber-dim:rgba(232,160,32,.12);--green:#4CAF50;--green-dim:rgba(76,175,80,.12);--red:#F06060;--red-dim:rgba(240,96,96,.12);--r:12px;--r-sm:8px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.5;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:0 0 32px}
.header{width:100%;background:var(--surface);border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;gap:12px}
.brand-icon{width:36px;height:36px;border-radius:8px;background:var(--amber);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;color:#0D0D0D;flex-shrink:0}
.header-text h1{font-size:15px;font-weight:600;letter-spacing:-.3px}
.header-text p{font-size:11px;color:var(--muted);margin-top:1px}
.status-pill{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;padding:5px 11px;border-radius:20px;letter-spacing:.3px;text-transform:uppercase;transition:all .3s}
.status-pill.idle{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
.status-pill.tracking{background:var(--green-dim);color:var(--green);border:1px solid rgba(76,175,80,.3)}
.status-pill.alert{background:var(--amber-dim);color:var(--amber);border:1px solid rgba(232,160,32,.3);animation:pulse 1.5s infinite}
.pill-dot{width:6px;height:6px;border-radius:50%;background:currentColor}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.main{width:100%;max-width:480px;padding:20px 16px;display:flex;flex-direction:column;gap:16px}
.fecha-badge{background:var(--amber-dim);border:1px solid rgba(232,160,32,.3);border-radius:6px;padding:6px 12px;font-size:11px;color:var(--amber);font-weight:600;text-align:center}
.filter-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px}
.filter-label{font-size:10px;font-weight:700;color:var(--hint);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
.filter-select{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:var(--r-sm);padding:10px 12px;font-size:13px}
.pos-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px}
.pos-label{font-size:10px;font-weight:700;color:var(--hint);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px}
.pos-coords{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.coord-item{background:var(--surface2);border-radius:var(--r-sm);padding:10px 12px}
.coord-name{font-size:10px;color:var(--muted);margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px}
.coord-val{font-size:13px;font-weight:600;color:var(--text)}
.accuracy-row{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);padding-top:8px;border-top:1px solid var(--border)}
.accuracy-dot{width:8px;height:8px;border-radius:50%;background:var(--hint);flex-shrink:0;transition:background .3s}
.accuracy-dot.good{background:var(--green)}.accuracy-dot.ok{background:var(--amber)}.accuracy-dot.bad{background:var(--red)}
.section-label{font-size:10px;font-weight:700;color:var(--hint);letter-spacing:1px;text-transform:uppercase;padding:0 4px}
.client-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:border-color .3s}
.client-card.nearby{border-color:rgba(232,160,32,.5);box-shadow:0 0 0 1px rgba(232,160,32,.15)}
.client-card.inside{border-color:rgba(76,175,80,.6);box-shadow:0 0 0 2px rgba(76,175,80,.12)}
.client-header{padding:14px 16px;display:flex;align-items:flex-start;gap:12px}
.client-icon{width:36px;height:36px;border-radius:var(--r-sm);background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.client-info{flex:1;min-width:0}
.client-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.client-sub{font-size:11px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.distance-badge{flex-shrink:0;text-align:right}
.dist-val{font-size:18px;font-weight:700;letter-spacing:-1px;line-height:1}
.dist-unit{font-size:10px;color:var(--muted);margin-top:2px}
.dist-val.far{color:var(--hint)}.dist-val.near{color:var(--amber)}.dist-val.inside{color:var(--green)}
.tasks-body{border-top:1px solid var(--border);padding:12px 16px;display:none;flex-direction:column;gap:6px;background:var(--surface2)}
.tasks-body.visible{display:flex}
.task-item{display:flex;align-items:flex-start;gap:8px;font-size:12px;padding:8px 10px;background:var(--surface);border-radius:6px;border:1px solid var(--border)}
.task-bullet{width:6px;height:6px;border-radius:50%;background:var(--amber);flex-shrink:0;margin-top:5px}
.notif-panel{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:2px solid var(--amber);padding:20px 20px 28px;transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);z-index:100;max-height:70vh;overflow-y:auto}
.notif-panel.show{transform:translateY(0)}
.notif-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.notif-title{font-size:15px;font-weight:700;color:var(--amber)}
.notif-close{background:var(--surface2);border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer}
.notif-client{font-size:16px;font-weight:700;margin-bottom:2px}
.notif-prom{font-size:11px;color:var(--muted);margin-bottom:12px}
.notif-tasks{display:flex;flex-direction:column;gap:6px}
.notif-task{display:flex;align-items:flex-start;gap:10px;background:var(--surface2);border-radius:8px;padding:10px 12px;border:1px solid var(--border)}
.ntask-num{font-size:10px;font-weight:700;color:var(--amber);background:var(--amber-dim);border-radius:4px;padding:2px 6px;flex-shrink:0;margin-top:1px}
.ntask-text{font-size:13px;line-height:1.4}
.start-btn{width:100%;padding:16px;border-radius:var(--r);background:var(--amber);color:#0D0D0D;font-size:15px;font-weight:700;border:none;cursor:pointer;transition:opacity .15s}
.start-btn:active{opacity:.8}
.start-btn:disabled{background:var(--surface2);color:var(--muted);cursor:default}
.error-card{background:var(--red-dim);border:1px solid rgba(240,96,96,.3);border-radius:var(--r);padding:14px 16px;font-size:13px;color:var(--red);display:none}
.error-card.show{display:block}
.backdrop{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99;display:none}
.backdrop.show{display:block}
</style>
</head>

<div class="header">
  <div class="brand-icon">1994</div>
  <div class="header-text">
    <h1>Geo Tareas</h1>
    <p>STRIEDER DANIEL &mdash; 4 promotores</p>
  </div>
  <div class="status-pill idle" id="status-pill">
    <div class="pill-dot"></div>
    <span id="status-text">Inactivo</span>
  </div>
</div>
<div class="main">
  <div class="fecha-badge" id="fecha-badge"></div>

  <div class="filter-card">

  <div class="error-card" id="error-card"></div>

  <div class="pos-card" id="pos-card" style="display:none">

    <div class="accuracy-row"><div class="accuracy-dot" id="acc-dot"></div><span id="acc-text">Esperando señal...</span></div>
  </div>

  <div class="section-label" id="clients-label" style="display:none">Puntos de venta (<span id="clients-count">0</span>)</div>
  <div id="clients-list"></div>
</div>

<div class="backdrop" id="backdrop" onclick="closeNotif()"></div>
<div class="notif-panel" id="notif-panel">
  <div class="notif-header">
    <div class="notif-title">&#128205; &#161;Estás en el PDV!</div>
    <button class="notif-close" onclick="closeNotif()">Cerrar</button>
  </div>
  <div class="notif-client" id="notif-client"></div>
  <div class="notif-prom" id="notif-prom"></div>
  <div class="notif-tasks" id="notif-tasks"></div>
</div>

const RADIO_METROS=50;
let watchId=null,alertasMostradas=new Set(),clientesFiltrados=[...TODOS_CLIENTES];

const hoy=new Date();
document.getElementById('fecha-badge').textContent='Tareas del día: '+hoy.toLocaleDateString('es-AR',{weekday:'long',year:'numeric',month:'long',day:'numeric'});

function distanciaMetros(lat1,lng1,lat2,lng2){
  const R=6371000,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function filtrarPromotor(){
  const val=document.getElementById('filtro-promotor').value;
  clientesFiltrados=val?TODOS_CLIENTES.filter(c=>c.promotor===val):[...TODOS_CLIENTES];
  alertasMostradas.clear();
  if(document.getElementById('pos-card').style.display!=='none'){
    document.getElementById('clients-count').textContent=clientesFiltrados.length;
    renderClientes([]);
  }
}

function startTracking(){
  if(!navigator.geolocation){showError('Tu navegador no soporta geolocalización.');return;}
  if('Notification'in window&&Notification.permission==='default')Notification.requestPermission();
  document.getElementById('start-btn').disabled=true;
  document.getElementById('start-btn').textContent='Rastreando...';
  document.getElementById('pos-card').style.display='block';
  document.getElementById('clients-label').style.display='block';
  document.getElementById('clients-count').textContent=clientesFiltrados.length;
  setPill('tracking','Rastreando');
  renderClientes([]);
  watchId=navigator.geolocation.watchPosition(onPosicion,onError,{enableHighAccuracy:true,maximumAge:0,timeout:10000});
}

function onPosicion(pos){
  const lat=pos.coords.latitude,lng=pos.coords.longitude,acc=pos.coords.accuracy;
  document.getElementById('pos-lat').textContent=lat.toFixed(6);
  document.getElementById('pos-lng').textContent=lng.toFixed(6);
  const dot=document.getElementById('acc-dot'),accText=document.getElementById('acc-text');
  if(acc<=15){dot.className='accuracy-dot good';accText.textContent='Precisión: ±'+Math.round(acc)+' m — Excelente';}
  else if(acc<=40){dot.className='accuracy-dot ok';accText.textContent='Precisión: ±'+Math.round(acc)+' m — Aceptable';}
  else{dot.className='accuracy-dot bad';accText.textContent='Precisión: ±'+Math.round(acc)+' m — Señal débil';}
  const con=clientesFiltrados.map(c=>({...c,distancia:Math.round(distanciaMetros(lat,lng,c.lat,c.lng))}));
  con.sort((a,b)=>a.distancia-b.distancia);
  renderClientes(con);
  verificarGeofence(con);
}

function verificarGeofence(clientes){
  let dentroDe=null;
  for(const c of clientes){
    if(c.distancia<=RADIO_METROS){
      if(!alertasMostradas.has(c.codigo)){alertasMostradas.add(c.codigo);dentroDe=c;mostrarAlerta(c);break;}
    }else if(c.distancia>RADIO_METROS*3){alertasMostradas.delete(c.codigo);}
  }
  setPill(dentroDe?'alert':'tracking',dentroDe?'En PDV: '+dentroDe.nombre.split(' ')[0]:'Rastreando');
}

function mostrarAlerta(c){
  document.getElementById('notif-client').textContent=c.nombre;
  document.getElementById('notif-prom').textContent='Promotor: '+c.promotor+' · '+c.direccion+', '+c.localidad+' ('+c.distancia+'m)';
  document.getElementById('notif-tasks').innerHTML=c.tareas.map((t,i)=>`<div class="notif-task"><span class="ntask-num">${i+1}</span><span class="ntask-text">${t}</span></div>`).join('');
  document.getElementById('backdrop').classList.add('show');
  document.getElementById('notif-panel').classList.add('show');
  if('Notification'in window&&Notification.permission==='granted')
    new Notification('\uD83D\uDCCD PDV: '+c.nombre,{body:c.tareas.length+' tareas — '+c.promotor});
  if('vibrate'in navigator)navigator.vibrate([300,100,300,100,300]);
}

function closeNotif(){
  document.getElementById('backdrop').classList.remove('show');
  document.getElementById('notif-panel').classList.remove('show');
}

function renderClientes(clientes){
  const lista=document.getElementById('clients-list');
  const src=clientes.length?clientes:clientesFiltrados.map(c=>({...c,distancia:null}));
  lista.innerHTML=src.slice(0,60).map(c=>{
    const dentro=c.distancia!==null&&c.distancia<=RADIO_METROS;
    const cerca=c.distancia!==null&&c.distancia<=RADIO_METROS*3&&!dentro;
    const cardClass=dentro?'inside':cerca?'nearby':'';
    let distHTML='';
    if(c.distancia===null)distHTML='<div class="distance-badge"><div class="dist-val far">—</div><div class="dist-unit">metros</div></div>';
    else{
      const cls=dentro?'inside':c.distancia<200?'near':'far';
      const label=dentro?'✓ Aquí':c.distancia>=1000?(c.distancia/1000).toFixed(1)+' km':c.distancia+' m';
      distHTML=`<div class="distance-badge"><div class="dist-val ${cls}">${label}</div><div class="dist-unit">${dentro?'dentro del radio':'de distancia'}</div></div>`;
    }
    const tareasHTML=dentro?`<div class="tasks-body visible">${c.tareas.map(t=>`<div class="task-item"><div class="task-bullet"></div><div style="font-size:12px;line-height:1.4">${t}</div></div>`).join('')}</div>`:'';
    return`<div class="client-card ${cardClass}"><div class="client-header"><div class="client-icon">🏪</div><div class="client-info"><div class="client-name">${c.nombre}</div><div class="client-sub">${c.direccion} · ${c.localidad} · ${c.promotor}</div></div>${distHTML}</div>${tareasHTML}</div>`;
  }).join('');
}

function setPill(estado,texto){
  document.getElementById('status-pill').className='status-pill '+estado;
  document.getElementById('status-text').textContent=texto;
}
function showError(msg){
  document.getElementById('error-card').textContent=msg;
  document.getElementById('error-card').classList.add('show');
  setPill('idle','Error');
  document.getElementById('start-btn').disabled=false;
  document.getElementById('start-btn').textContent='Reintentar';
}
function onError(err){
  const msgs={1:'Permiso de ubicación denegado. Activalo en la configuración del navegador.',2:'No se pudo obtener tu ubicación.',3:'El GPS tardó demasiado. Intentá de nuevo.'};
  showError(msgs[err.code]||'Error de geolocalización.');
}
</script>
